<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art</title>
    <link rel="stylesheet" href="css/art.css">
</head>
<body>
    <div class="scene">
        <div class="sky">
            <div class="sun"></div>

            <div class="cloud cloud-one">
                <div class="cloud-part part-one"></div>
                <div class="cloud-part part-two"></div>
                <div class="cloud-part part-three"></div>
            </div>

            <div class="cloud cloud-two">
                <div class="cloud-part part-one"></div>
                <div class="cloud-part part-two"></div>
                <div class="cloud-part part-three"></div>
            </div>
        </div>

        <div class="grass">
            <div class="person">
                <div class="head"></div>
                <div class="body"></div>
                <div class="arm arm-left"></div>
                <div class="arm arm-right"></div>
                <div class="leg leg-left"></div>
                <div class="leg leg-right"></div>
                <div class="greeneye"></div>
                <div class="greeneye2"></div>
                <div class="blackdot"></div>.
                <div class="blackdot2"></div>
            </div>
            <div class="person2">
                <div class="head2"></div>
                <div class="body2"></div>
                <div class="arm arm-left2"></div>
                <div class="arm arm-right2"></div>
                <div class="leg leg-left2"></div>
                <div class="leg leg-right2"></div>
                <div class="blueeye"></div>
                <div class="blueeye2"></div>
                <div class="blackdot3"></div>.
                <div class="blackdot4"></div>
            </div>
        </div>
    </div>
</body>
</html>
